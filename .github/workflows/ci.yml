name: CI

on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: shellcheck
        run: |
          shellcheck -x \
            clevis-encrypt-fido2 \
            clevis-decrypt-fido2 \
            clevis-fido2-regen \
            dracut/modules.d/60clevis-pin-fido2/module-setup.sh \
            tests/stubs/fido2-cred \
            tests/stubs/fido2-assert \
            tests/stubs/fido2-token

      - name: bash -n syntax check
        run: |
          for f in clevis-encrypt-fido2 clevis-decrypt-fido2 clevis-fido2-regen \
                   tests/stubs/fido2-cred tests/stubs/fido2-assert tests/stubs/fido2-token; do
            bash -n "$f"
          done

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jose bats cryptsetup clevis clevis-luks

      # These exercise the surrounding plumbing (config parsing/validation,
      # JWE construction, error paths) against real `jose`, with only the
      # hardware-touching fido2-cred/fido2-assert/fido2-token binaries
      # stubbed (see tests/stubs/). They are NOT a cryptographic correctness
      # test of the real hmac-secret derivation -- that needs real hardware
      # or a QEMU+canokey-qemu virtual authenticator, which is out of scope
      # here.
      - name: Run encrypt/decrypt logic tests
        run: bats tests/encrypt_decrypt.bats

      # This one drives a real LUKS2 volume on a loop device with the real
      # clevis CLI (still only stubbing fido2-cred/fido2-assert/fido2-token),
      # so it needs root for losetup/cryptsetup. It's the only place in this
      # repo's test suite that can validate clevis-fido2-regen's LUKS-slot
      # orchestration; it's skipped (not failed) outside of an environment
      # like this one.
      - name: Run clevis-fido2-regen LUKS2 integration test
        run: sudo -E bats tests/regen.bats
